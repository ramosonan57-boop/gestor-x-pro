<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- 🔥 RESPONSIVE (IMPORTANTE PARA CELULAR) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestor Pro</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<header class="nav">
    <h1>Gestor Pro</h1>
</header>

<!-- HERO -->
<section class="hero">

    <div class="hero-overlay"></div>

    <div class="hero-box">
        <h2 class="fade-in">Control total de tus archivos</h2>
        <p class="fade-in delay">Seguro • Rápido • Profesional</p>

        <button onclick="irLogin()" class="fade-in delay2">
            Comenzar
        </button>
    </div>

    <!-- IMAGEN ANIMADA -->
    <img src="https://cdn-icons-png.flaticon.com/512/3767/3767084.png" class="floating-img">

</section>

<!-- LOGIN -->
<section id="loginSection">
    <div id="loginBox" class="card">

        <h2>Iniciar Sesión</h2>

        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="login()">Entrar</button>

    </div>
</section>

<!-- APP -->
<section id="appPanel" style="display:none;">

    <div class="app-container">

        <h2 id="bienvenida"></h2>

        <!-- SUBIR ARCHIVO -->
        <div class="card">
            <input type="file" id="fileInput">
            <button onclick="subirArchivo()">Subir Archivo</button>
        </div>

        <!-- ARCHIVOS USUARIO -->
        <div id="misArchivos" class="card"></div>

        <!-- PANEL ADMIN -->
        <div id="adminPanel" class="card" style="display:none;">

            <h3>Administrador</h3>

            <input type="text" id="nuevoUser" placeholder="Nuevo usuario">
            <input type="password" id="nuevoPass" placeholder="Contraseña">

            <button onclick="crearUsuario()">Crear Usuario</button>
            <button onclick="backup()">💾 Descargar Backup</button>

            <div id="todosArchivos"></div>

        </div>

        <!-- CERRAR SESIÓN -->
        <button class="logout" onclick="logout()">
            Cerrar sesión
        </button>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
